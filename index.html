<!-- Structured Data: FAQ (Landing) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Was ist Innovation Republic?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Innovation Republic ist eine gemeinnützige Initiative, die Innovations-Vorhaben für kleine und mittlere Unternehmen kuratiert. Wir klären den Bedarf, matchen passende Anbieter und begleiten die Umsetzung in kurzen Sprints."
      }
    },
    {
      "@type": "Question",
      "name": "Für wen ist Innovation Republic gedacht?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Für kleine und mittlere Unternehmen im deutschsprachigen Raum, die ein konkretes Innovations- oder Digitalisierungsvorhaben umsetzen wollen, aber Orientierung bei Bedarf, Anbieterwahl und Förderung suchen."
      }
    },
    {
      "@type": "Question",
      "name": "Was kostet Innovation Republic?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Die Bedarfsklärung und das Matching sind für KMU kostenfrei. Konkrete Sprint-Umsetzungen rechnen die jeweiligen Anbieter direkt mit dem KMU ab — wo möglich, mit Förderung."
      }
    },
    {
      "@type": "Question",
      "name": "Wie läuft ein Innovations-Sprint ab?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "In drei Phasen: Bedarf klären (1–2 Wochen), Anbieter matchen und briefen (2–3 Wochen), Umsetzung in einem fokussierten Sprint (typischerweise 4–12 Wochen) mit fester Begleitung."
      }
    },
    {
      "@type": "Question",
      "name": "Welche Förderungen sind verfügbar?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Je nach Vorhaben und Bundesland kommen Programme wie go-digital, Digital Jetzt oder regionale Innovationsgutscheine in Frage. Unser Fördergeld-Check zeigt passende Optionen für Ihr Vorhaben."
      }
    },
    {
      "@type": "Question",
      "name": "Wer steht hinter Innovation Republic?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Innovation Republic ist eine gemeinnützige Initiative von Unternehmern (in Gründung). Bis zur Gründung eines eigenen Innovation Republic e.V. übernimmt die vencly GmbH (München) die operative Trägerschaft."
      }
    }
  ]
}
</script>
